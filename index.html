<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#EDF0F3">
<title>Recall · 1·4·7</title>
<style>
  :root{
    --bg:#EDF0F3; --surface:#FFFFFF; --ink:#16202C; --muted:#64748B;
    --line:#DCE2E8; --line-soft:#E8EDF1;
    --due:#E08A00; --due-soft:#FBEFD8;
    --up:#0C8A8A; --up-soft:#DDF0F0;
    --done:#4B9E6A; --done-soft:#E2F0E7;
    --over:#D4483B; --over-soft:#F8E2DF;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --ui:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink); font-family:var(--ui); line-height:1.5;
    -webkit-font-smoothing:antialiased; padding:0 16px 96px;}
  .wrap{max-width:760px; margin:0 auto}

  header{padding:28px 0 18px; display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:12px}
  .brand h1{font-size:26px; font-weight:650; letter-spacing:-.02em; margin:0}
  .brand .ticks{font-family:var(--mono); font-size:13px; color:var(--muted); letter-spacing:.05em}
  .brand .ticks b{color:var(--due); font-weight:600}
  .today{font-family:var(--mono); font-size:12.5px; color:var(--muted); text-align:right}
  .today .count{display:block; font-size:22px; color:var(--ink); font-weight:600}
  .today .count.zero{color:var(--muted)}

  .add{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:18px}
  .add input, .add textarea{width:100%; border:0; background:transparent; color:var(--ink);
    font-family:var(--ui); font-size:15px; resize:none; outline:none;}
  .add input#title{font-size:16px; font-weight:550; padding:4px 6px}
  .add input#title::placeholder{color:#9AA7B4; font-weight:500}
  .add input#link{font-size:13px; padding:2px 6px; color:var(--up); font-family:var(--mono)}
  .add input#link::placeholder{color:#B2BCC6; font-family:var(--ui)}
  .add-row{display:flex; align-items:center; justify-content:space-between; margin-top:6px; padding-top:8px; border-top:1px solid var(--line-soft)}
  .add-row .hint{font-family:var(--mono); font-size:11.5px; color:#9AA7B4}
  button.primary{background:var(--ink); color:#fff; border:0; border-radius:9px;
    font-family:var(--ui); font-size:13.5px; font-weight:550; padding:8px 16px; cursor:pointer;}
  button.primary:hover{background:#243244}
  button.primary:disabled{background:#C4CDD6; cursor:default}

  .tabs{display:flex; gap:4px; margin-bottom:14px; flex-wrap:wrap}
  .tab{font-family:var(--mono); font-size:12.5px; border:1px solid var(--line); background:var(--surface);
    color:var(--muted); padding:6px 12px; border-radius:999px; cursor:pointer; display:flex; gap:7px; align-items:center;}
  .tab[aria-selected="true"]{background:var(--ink); color:#fff; border-color:var(--ink)}
  .tab .n{opacity:.7}

  .list{display:flex; flex-direction:column; gap:10px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px 14px 12px; animation:rise .22s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
  .card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:12px}
  .card h3{margin:0; font-size:15.5px; font-weight:600; letter-spacing:-.01em; word-break:break-word}
  .card h3 a{color:var(--ink); text-decoration:none; border-bottom:1.5px solid var(--up-soft)}
  .card h3 a:hover{border-color:var(--up)}
  .card .note{margin:3px 0 0; font-size:13px; color:var(--muted); word-break:break-word}
  .badge{flex:none; font-family:var(--mono); font-size:11px; font-weight:600; padding:4px 9px; border-radius:7px; white-space:nowrap}
  .badge.over{background:var(--over-soft); color:var(--over)}
  .badge.due{background:var(--due-soft); color:var(--due)}
  .badge.up{background:var(--up-soft); color:var(--up)}
  .badge.done{background:var(--done-soft); color:var(--done)}

  .track{display:flex; align-items:center; margin:12px 2px 4px}
  .step{display:flex; align-items:center; flex:1}
  .dot{width:26px; height:26px; flex:none; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:11.5px; font-weight:600; border:1.5px solid var(--line); color:#A6B1BC; background:var(--surface);}
  .dot.done{background:var(--done); border-color:var(--done); color:#fff}
  .dot.active{border-color:var(--due); color:var(--due); box-shadow:0 0 0 3px var(--due-soft)}
  .dot.master{border-color:var(--done); color:var(--done)}
  .bar{flex:1; height:2px; background:var(--line); margin:0 -1px}
  .bar.done{background:var(--done)}
  .step:last-child{flex:none}

  .card-actions{display:flex; gap:8px; margin-top:12px; padding-top:11px; border-top:1px solid var(--line-soft)}
  .btn{font-family:var(--ui); font-size:13px; font-weight:550; border-radius:8px; padding:7px 13px; cursor:pointer; border:1px solid transparent}
  .btn.review{background:var(--ink); color:#fff}
  .btn.review:hover{background:#243244}
  .btn.forgot{background:transparent; color:var(--muted); border-color:var(--line)}
  .btn.forgot:hover{background:#F4F6F8; color:var(--over)}
  .btn.del{margin-left:auto; background:transparent; color:#9AA7B4; border-color:transparent; padding:7px 8px}
  .btn.del:hover{color:var(--over)}

  .empty{text-align:center; padding:48px 20px; color:var(--muted)}
  .empty .big{font-size:34px; margin-bottom:6px}
  .empty p{margin:4px 0; font-size:14px}
  .empty .sub{font-family:var(--mono); font-size:12px; color:#9AA7B4}

  footer{margin-top:26px; padding-top:16px; border-top:1px solid var(--line); display:flex; gap:10px; align-items:center; flex-wrap:wrap}
  footer button{font-family:var(--mono); font-size:12px; color:var(--muted); background:transparent; border:1px solid var(--line); border-radius:8px; padding:6px 11px; cursor:pointer}
  footer button:hover{background:var(--surface); color:var(--ink)}
  footer .grow{flex:1}
  footer .meta{font-family:var(--mono); font-size:11.5px; color:#9AA7B4}

  @media (prefers-reduced-motion:reduce){ .card{animation:none} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>Recall</h1>
      <span class="ticks">review on <b>day 1 · 4 · 7</b></span>
    </div>
    <div class="today">
      <span class="count" id="dueCount">0</span>
      <span>due to review</span>
    </div>
  </header>

  <div class="add">
    <input id="title" type="text" placeholder="Concept name" autocomplete="off" maxlength="140">
    <input id="link"  type="text" placeholder="Link to concept page (optional) — e.g. concepts/max-subarray" autocomplete="off" maxlength="300">
    <div class="add-row">
      <span class="hint">↵ to add · anchors 1·4·7 from today</span>
      <button class="primary" id="addBtn" disabled>Add concept</button>
    </div>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" data-filter="due" aria-selected="true">Due <span class="n" id="n-due">0</span></button>
    <button class="tab" role="tab" data-filter="upcoming" aria-selected="false">Upcoming <span class="n" id="n-upcoming">0</span></button>
    <button class="tab" role="tab" data-filter="mastered" aria-selected="false">Mastered <span class="n" id="n-mastered">0</span></button>
    <button class="tab" role="tab" data-filter="all" aria-selected="false">All <span class="n" id="n-all">0</span></button>
  </div>

  <div class="list" id="list"></div>

  <footer>
    <button id="exportBtn">↓ Export backup</button>
    <button id="importBtn">↑ Import</button>
    <input type="file" id="importFile" accept="application/json" hidden>
    <span class="grow"></span>
    <span class="meta" id="totalMeta"></span>
  </footer>
</div>

<script>
/* SEED concepts — the CLI appends here when a new concept page is added.
   Format: {title, slug, note} — `created` defaults to first-load day if absent.
   This is the only repo-stored state; per-review progress lives in localStorage. */
const SEED = [
];

(function(){
  "use strict";
  const KEY = "recall_147_v2";
  const DAY = 86400000;
  const OFFSETS = [1,4,7];
  let items = load();
  let filter = "due";

  function load(){
    let stored = [];
    try { const raw = localStorage.getItem(KEY); stored = raw ? JSON.parse(raw) : []; } catch(e){ stored = []; }
    // merge SEED: any seed slug not already tracked is added with today's date
    const known = new Set(stored.map(x=>x.slug).filter(Boolean));
    for (const s of SEED){
      if (s.slug && !known.has(s.slug)){
        stored.push({ id:"seed-"+s.slug, title:s.title, slug:s.slug, note:s.note||"",
                      created:Date.now(), stage:0, log:[] });
      }
    }
    return stored;
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(items)); }catch(e){ alert("Couldn't save — storage may be full or blocked."); } }

  function startOfToday(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
  function endOfToday(){ return startOfToday()+DAY-1; }
  function dueDate(it){ return it.stage>=3 ? Infinity : it.created + OFFSETS[it.stage]*DAY; }
  function floorDay(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
  function daysBetween(a,b){ return Math.round((floorDay(a)-floorDay(b))/DAY); }
  function statusOf(it){ if(it.stage>=3) return "mastered"; const dd=dueDate(it);
    if(dd<startOfToday()) return "overdue"; if(dd<=endOfToday()) return "due"; return "upcoming"; }
  function relLabel(it){ if(it.stage>=3) return "mastered"; const d=daysBetween(dueDate(it),Date.now());
    if(d<0) return Math.abs(d)+"d overdue"; if(d===0) return "today"; if(d===1) return "tomorrow"; return "in "+d+"d"; }

  function add(){
    const t=title.value.trim(); if(!t) return;
    const rawLink=link.value.trim();
    items.unshift({ id:Date.now()+"-"+Math.random().toString(36).slice(2,7), title:t,
      slug:rawLink||"", note:"", created:Date.now(), stage:0, log:[] });
    title.value=""; link.value=""; addBtn.disabled=true; save(); render(); title.focus();
  }
  function review(id){ const it=items.find(x=>x.id===id); if(!it) return;
    it.log.push({at:Date.now(),stage:it.stage,action:"reviewed"}); it.stage++; save(); render(); }
  function forgot(id){ const it=items.find(x=>x.id===id); if(!it) return;
    it.log.push({at:Date.now(),stage:it.stage,action:"forgot"}); it.created=Date.now(); it.stage=0; save(); render(); }
  function del(id){ const it=items.find(x=>x.id===id);
    if(it && !confirm('Remove "'+it.title+'" from the tracker?')) return;
    items=items.filter(x=>x.id!==id); save(); render(); }

  function counts(){ const c={due:0,upcoming:0,mastered:0,all:items.length};
    for(const it of items){ const s=statusOf(it);
      if(s==="due"||s==="overdue") c.due++; else if(s==="upcoming") c.upcoming++; else if(s==="mastered") c.mastered++; }
    return c; }

  function trackHTML(it){
    let h='<div class="track">';
    for(let i=0;i<3;i++){
      const completed=it.stage>i, active=it.stage===i&&it.stage<3;
      const cls=completed?"dot done":active?"dot active":"dot";
      h+='<div class="step"><div class="'+cls+'" title="review '+OFFSETS[i]+' days after learning">'+OFFSETS[i]+'</div>';
      if(i<2) h+='<div class="bar'+(it.stage>i?" done":"")+'"></div>';
      h+='</div>';
    }
    const m=it.stage>=3?"dot master done":"dot master";
    h+='<div class="bar'+(it.stage>=3?" done":"")+'"></div><div class="'+m+'" title="mastered">✓</div></div>';
    return h;
  }

  function titleHTML(it){
    const t=esc(it.title);
    if(it.slug){ const href=/^https?:/.test(it.slug)?it.slug:(it.slug.replace(/\.md$/,'')+'.md');
      return '<a href="'+esc(href)+'">'+t+'</a>'; }
    return t;
  }

  function cardHTML(it){
    const st=statusOf(it);
    const badgeCls=st==="overdue"?"over":st==="due"?"due":st==="mastered"?"done":"up";
    const canReview=it.stage<3 && (st==="due"||st==="overdue");
    let a='<div class="card-actions">';
    if(it.stage<3){
      a+='<button class="btn review" data-act="review" data-id="'+it.id+'"'+(canReview?"":' disabled style="opacity:.45;cursor:default"')+'>Reviewed ✓</button>';
      a+='<button class="btn forgot" data-act="forgot" data-id="'+it.id+'">Forgot ↺</button>';
    } else {
      a+='<button class="btn forgot" data-act="forgot" data-id="'+it.id+'">Review again ↺</button>';
    }
    a+='<button class="btn del" data-act="del" data-id="'+it.id+'">Remove</button></div>';
    return '<div class="card"><div class="card-top"><div><h3>'+titleHTML(it)+'</h3>'
      + (it.note?'<p class="note">'+esc(it.note)+'</p>':'')
      + '</div><span class="badge '+badgeCls+'">'+relLabel(it)+'</span></div>'
      + trackHTML(it) + a + '</div>';
  }

  function emptyHTML(){
    const map={ due:["🎯","Nothing due right now.","Add a concept, or check Upcoming."],
      upcoming:["🌊","Nothing scheduled ahead.","Reviewed concepts resurface here."],
      mastered:["🏆","Nothing mastered yet.","Clear all three reviews (1·4·7) to graduate."],
      all:["📥","No concepts tracked yet.","Add your first concept above."] };
    const [big,p,sub]=map[filter]||map.all;
    return '<div class="empty"><div class="big">'+big+'</div><p>'+p+'</p><p class="sub">'+sub+'</p></div>';
  }

  function render(){
    const c=counts();
    document.getElementById("n-due").textContent=c.due;
    document.getElementById("n-upcoming").textContent=c.upcoming;
    document.getElementById("n-mastered").textContent=c.mastered;
    document.getElementById("n-all").textContent=c.all;
    const dc=document.getElementById("dueCount"); dc.textContent=c.due; dc.className="count"+(c.due===0?" zero":"");
    document.getElementById("totalMeta").textContent=items.length?items.length+" tracked · "+c.mastered+" mastered":"";
    let shown=items.filter(it=>{ const s=statusOf(it);
      if(filter==="all") return true; if(filter==="due") return s==="due"||s==="overdue";
      if(filter==="upcoming") return s==="upcoming"; if(filter==="mastered") return s==="mastered"; });
    shown.sort((a,b)=> filter==="mastered" ? b.created-a.created : dueDate(a)-dueDate(b));
    const list=document.getElementById("list");
    list.innerHTML = shown.length ? shown.map(cardHTML).join("") : emptyHTML();
  }

  function esc(s){ return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

  const title=document.getElementById("title");
  const link=document.getElementById("link");
  const addBtn=document.getElementById("addBtn");
  title.addEventListener("input",()=>{ addBtn.disabled=!title.value.trim(); });
  title.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); add(); }});
  link.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); add(); }});
  addBtn.addEventListener("click",add);

  document.querySelectorAll(".tab").forEach(tab=>{ tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected","false"));
    tab.setAttribute("aria-selected","true"); filter=tab.dataset.filter; render(); }); });

  document.getElementById("list").addEventListener("click",e=>{
    const btn=e.target.closest("[data-act]"); if(!btn) return;
    const {act,id}=btn.dataset;
    if(act==="review") review(id); else if(act==="forgot") forgot(id); else if(act==="del") del(id);
  });

  document.getElementById("exportBtn").addEventListener("click",()=>{
    const blob=new Blob([JSON.stringify(items,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download="recall-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click(); URL.revokeObjectURL(url);
  });
  document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
  document.getElementById("importFile").addEventListener("change",e=>{
    const f=e.target.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const data=JSON.parse(r.result); if(!Array.isArray(data)) throw 0;
      if(items.length && !confirm("Replace current "+items.length+" item(s) with "+data.length+" from backup?")) return;
      items=data; save(); render(); }catch(err){ alert("Couldn't read that file — is it a Recall backup?"); } };
    r.readAsText(f); e.target.value="";
  });

  save(); render();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E1216">
<title>Evergreen</title>
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a class="logo" href="index.html">
      <svg class="leaf" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17 8C8 10 5.9 16.2 3.8 21.7c-.3.7.3 1.3 1 1 .5-.2 1-.5 1.4-.7C12 18 15 15 17 8zM19 3c-6 1-9 4-11 9 1.5-1 3-1.5 5-2-2 1.5-3.5 3-4.5 5C14 13 18 10 19 3z"/></svg>
      Evergreen
    </a>
    <span class="spacer"></span>
    <a class="link" href="index.html">Home</a>
    <a class="link" href="tracker.html">Tracker</a>
    <a class="link" href="concepts.html" aria-current="page">Concepts</a>
  </nav>

  <div class="reader-top">
    <a class="back" href="concepts.html">← all concepts</a>
  </div>

  <article class="md" id="md"><div class="loading">Loading…</div></article>
</div>

<script src="assets/marked.min.js"></script>
<script src="assets/concepts.js"></script>
<script>
  (function(){
    const md = document.getElementById("md");
    const params = new URLSearchParams(location.search);
    const raw = params.get("c") || "";
    // only allow safe slug characters — this becomes part of a fetch path
    const slug = raw.replace(/[^a-z0-9-]/gi, "");

    if (!slug){
      md.innerHTML = '<div class="err">No concept specified. <a href="concepts.html">Pick one →</a></div>';
      return;
    }
    const meta = (window.CONCEPTS || []).find(c => c.slug === slug);
    if (meta) document.title = meta.title + " — Evergreen";

    fetch("concepts/" + slug + ".md", {cache:"no-cache"})
      .then(r => { if(!r.ok) throw new Error(r.status); return r.text(); })
      .then(text => {
        marked.setOptions({ gfm:true, breaks:false, headerIds:false, mangle:false });
        md.innerHTML = marked.parse(text);
        const h1 = md.querySelector("h1");
        if (h1 && !meta) document.title = h1.textContent + " — Evergreen";
      })
      .catch(err => {
        md.innerHTML = '<div class="err">Couldn’t load <code>concepts/'
          + slug + '.md</code> (' + err.message + ').<br>'
          + '<a href="concepts.html">Back to concepts →</a></div>';
      });
  })();
</script>
</body>
</html>

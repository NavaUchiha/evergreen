<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E1216">
<title>Tracker — Evergreen · 1·4·7</title>
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a class="logo" href="index.html">
      <svg class="leaf" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17 8C8 10 5.9 16.2 3.8 21.7c-.3.7.3 1.3 1 1 .5-.2 1-.5 1.4-.7C12 18 15 15 17 8zM19 3c-6 1-9 4-11 9 1.5-1 3-1.5 5-2-2 1.5-3.5 3-4.5 5C14 13 18 10 19 3z"/></svg>
      Evergreen
    </a>
    <span class="spacer"></span>
    <a class="link" href="index.html">Home</a>
    <a class="link" href="tracker.html" aria-current="page">Tracker</a>
    <a class="link" href="concepts.html">Concepts</a>
  </nav>

  <header class="tracker-head">
    <div class="brand">
      <h1>Tracker</h1>
      <span class="ticks">review on <b>day 1 · 4 · 7</b></span>
    </div>
    <div class="today">
      <span class="count" id="dueCount">0</span>
      <span>due to review</span>
    </div>
  </header>

  <div class="tokenbar" id="tokenbar">
    <span class="dot"></span>
    <span class="lbl">Write access:</span>
    <input id="token" type="password" placeholder="paste your write token to record reviews" autocomplete="off">
    <button id="saveToken">Save token</button>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" data-filter="due" aria-selected="true">Due <span class="n" id="n-due">0</span></button>
    <button class="tab" role="tab" data-filter="upcoming" aria-selected="false">Upcoming <span class="n" id="n-upcoming">0</span></button>
    <button class="tab" role="tab" data-filter="mastered" aria-selected="false">Mastered <span class="n" id="n-mastered">0</span></button>
    <button class="tab" role="tab" data-filter="all" aria-selected="false">All <span class="n" id="n-all">0</span></button>
  </div>

  <div class="list" id="list"><p class="empty sub" style="padding:30px">Loading…</p></div>
  <div class="tracker-foot" id="totalMeta"></div>
</div>

<script src="assets/api.js"></script>
<script>
(function(){
  "use strict";
  const DAY=86400000, OFFSETS=[1,4,7];
  const $=(id)=>document.getElementById(id);
  let items=[], filter="due";
  function esc(s){ return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

  // token bar
  const tokenbar=$("tokenbar"), tokenInput=$("token");
  function refreshToken(){ const ok=EvergreenAPI.hasToken(); tokenbar.classList.toggle("ok",ok);
    tokenbar.querySelector(".lbl").textContent = ok?"Write access: connected":"Write access:";
    if(ok) tokenInput.placeholder="•••••••• (saved on this device)"; }
  $("saveToken").addEventListener("click",()=>{ EvergreenAPI.setToken(tokenInput.value); tokenInput.value=""; refreshToken(); });
  refreshToken();
  function needToken(){ if(EvergreenAPI.hasToken()) return true;
    const t=prompt("Paste your write token to record reviews:"); if(t){ EvergreenAPI.setToken(t); refreshToken(); return true; } return false; }

  function startOfToday(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
  function endOfToday(){ return startOfToday()+DAY-1; }
  function floorDay(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
  function statusOf(it){ if(it.mastered) return "mastered"; if(!it.due_at) return "upcoming";
    if(it.due_at<startOfToday()) return "overdue"; if(it.due_at<=endOfToday()) return "due"; return "upcoming"; }
  function relLabel(it){ if(it.mastered) return "mastered"; if(!it.due_at) return "";
    const d=Math.round((floorDay(it.due_at)-floorDay(Date.now()))/DAY);
    if(d<0) return Math.abs(d)+"d overdue"; if(d===0) return "today"; if(d===1) return "tomorrow"; return "in "+d+"d"; }

  function counts(){ const c={due:0,upcoming:0,mastered:0,all:items.length};
    for(const it of items){ const s=statusOf(it);
      if(s==="due"||s==="overdue") c.due++; else if(s==="upcoming") c.upcoming++; else if(s==="mastered") c.mastered++; }
    return c; }

  function trackHTML(it){ let h='<div class="track">';
    for(let i=0;i<3;i++){ const completed=it.stage>i, active=it.stage===i&&it.stage<3;
      const cls=completed?"dot done":active?"dot active":"dot";
      h+='<div class="step"><div class="'+cls+'" title="review '+OFFSETS[i]+' days after learning">'+OFFSETS[i]+'</div>';
      if(i<2) h+='<div class="bar'+(it.stage>i?" done":"")+'"></div>'; h+='</div>'; }
    const m=it.stage>=3?"dot master done":"dot master";
    h+='<div class="bar'+(it.stage>=3?" done":"")+'"></div><div class="'+m+'" title="mastered">✓</div></div>'; return h; }

  function cardHTML(it){ const st=statusOf(it);
    const badgeCls=st==="overdue"?"over":st==="due"?"due":st==="mastered"?"done":"up";
    const canReview=it.stage<3 && (st==="due"||st==="overdue");
    const tags=(it.tags||[]).map(t=>'<span class="chip">'+esc(t)+'</span>').join("");
    let a='<div class="card-actions">';
    if(it.stage<3){
      a+='<button class="abtn review" data-act="review" data-slug="'+esc(it.slug)+'"'+(canReview?"":' disabled style="opacity:.45;cursor:default"')+'>Reviewed ✓</button>';
      a+='<button class="abtn forgot" data-act="forgot" data-slug="'+esc(it.slug)+'">Forgot ↺</button>';
    } else { a+='<button class="abtn forgot" data-act="forgot" data-slug="'+esc(it.slug)+'">Review again ↺</button>'; }
    a+='<a class="abtn del" style="margin-left:auto;text-decoration:none" href="reader.html?c='+encodeURIComponent(it.slug)+'">Open →</a></div>';
    return '<div class="card"><div class="card-top"><div><h3><a href="reader.html?c='+encodeURIComponent(it.slug)+'">'+esc(it.title)+'</a></h3>'
      + (it.note?'<p class="note">'+esc(it.note)+'</p>':'')
      + (tags?'<div class="chiprow" style="margin-top:7px">'+tags+'</div>':'')
      + '</div><span class="badge '+badgeCls+'">'+relLabel(it)+'</span></div>'
      + trackHTML(it) + a + '</div>'; }

  function emptyHTML(){ const map={ due:["🎯","Nothing due right now.","Add concepts, or check Upcoming."],
      upcoming:["🌊","Nothing scheduled ahead.","Reviewed concepts resurface here."],
      mastered:["🏆","Nothing mastered yet.","Clear all three reviews (1·4·7) to graduate."],
      all:["🌱","No concepts yet.","Write your first one in Concepts."] };
    const [big,p,sub]=map[filter]||map.all;
    return '<div class="empty"><div class="big">'+big+'</div><p>'+p+'</p><p class="sub">'+sub+'</p></div>'; }

  function render(){ const c=counts();
    $("n-due").textContent=c.due; $("n-upcoming").textContent=c.upcoming; $("n-mastered").textContent=c.mastered; $("n-all").textContent=c.all;
    const dc=$("dueCount"); dc.textContent=c.due; dc.className="count"+(c.due===0?" zero":"");
    $("totalMeta").textContent=items.length?items.length+" tracked · "+c.mastered+" mastered":"";
    let shown=items.filter(it=>{ const s=statusOf(it);
      if(filter==="all") return true; if(filter==="due") return s==="due"||s==="overdue";
      if(filter==="upcoming") return s==="upcoming"; if(filter==="mastered") return s==="mastered"; });
    shown.sort((a,b)=> filter==="mastered" ? b.updated_at-a.updated_at : (a.due_at||Infinity)-(b.due_at||Infinity));
    $("list").innerHTML = shown.length ? shown.map(cardHTML).join("") : emptyHTML(); }

  async function act(slug, fn){ if(!needToken()) return;
    try{ const updated=await fn(slug); const it=items.find(x=>x.slug===slug);
      if(it){ Object.assign(it, updated); } render(); }
    catch(e){ alert(e.message); } }

  document.querySelectorAll(".tab").forEach(tab=>tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected","false"));
    tab.setAttribute("aria-selected","true"); filter=tab.dataset.filter; render(); }));
  $("list").addEventListener("click",e=>{ const btn=e.target.closest("[data-act]"); if(!btn) return;
    const {act:a,slug}=btn.dataset;
    if(a==="review") act(slug, EvergreenAPI.review); else if(a==="forgot") act(slug, EvergreenAPI.forgot); });

  EvergreenAPI.listConcepts().then(list=>{ items=list; render(); })
    .catch(err=>{ $("list").innerHTML='<div class="empty"><div class="big">🌐</div><p>'+esc(err.message)+'</p><p class="sub">The concepts server may be offline.</p></div>'; });
})();
</script>
</body>
</html>

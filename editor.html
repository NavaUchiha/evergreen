<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0E1216">
<title>Write — Evergreen</title>
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a class="logo" href="index.html">
      <svg class="leaf" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17 8C8 10 5.9 16.2 3.8 21.7c-.3.7.3 1.3 1 1 .5-.2 1-.5 1.4-.7C12 18 15 15 17 8zM19 3c-6 1-9 4-11 9 1.5-1 3-1.5 5-2-2 1.5-3.5 3-4.5 5C14 13 18 10 19 3z"/></svg>
      Evergreen
    </a>
    <span class="spacer"></span>
    <a class="link" href="index.html">Home</a>
    <a class="link" href="tracker.html">Tracker</a>
    <a class="link" href="concepts.html" aria-current="page">Concepts</a>
  </nav>

  <div class="tokenbar" id="tokenbar">
    <span class="dot"></span>
    <span class="lbl">Password:</span>
    <input id="token" type="password" placeholder="enter your password to save changes" autocomplete="current-password">
    <button id="saveToken">Save</button>
  </div>

  <div class="editor-head">
    <h2 id="edtitle">Write a concept</h2>
    <div class="actions">
      <a class="btn ghost" href="concepts.html">Cancel</a>
      <button class="btn ghost" id="delBtn" style="display:none">Delete</button>
      <button class="btn primary" id="saveBtn">Save</button>
    </div>
  </div>

  <div class="ed-field">
    <label for="title">Title</label>
    <input id="title" type="text" placeholder="e.g. Dijkstra's shortest path" maxlength="140">
    <div class="slughint" id="slughint"></div>
  </div>
  <div class="ed-field">
    <label for="note">One-line summary</label>
    <input id="note" type="text" placeholder="the gist, in a sentence" maxlength="200">
  </div>
  <div class="ed-field">
    <label for="tags">Tags <span style="text-transform:none;color:#5D6B78">(comma-separated)</span></label>
    <input id="tags" type="text" placeholder="graphs, greedy, interview" maxlength="200">
  </div>

  <div class="split">
    <div class="pane" id="sectionEditors"></div>
    <div class="pane">
      <label>Preview</label>
      <div class="md" id="preview" style="margin-top:0"></div>
    </div>
  </div>

  <div class="ed-save-row">
    <button class="btn primary" id="saveBtn2">Save concept</button>
    <span class="saved" id="savedMsg"></span>
    <span class="grow"></span>
    <span class="slughint" id="status"></span>
  </div>
</div>

<script src="assets/api.js"></script>
<script src="assets/sections.js"></script>
<script src="assets/marked.min.js"></script>
<script>
(function(){
  marked.setOptions({ gfm:true, breaks:false, headerIds:false, mangle:false });
  const $ = (id)=>document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const editingSlug = (params.get("c")||"").replace(/[^a-z0-9-]/gi,"");
  let existing = null;

  function slugify(s){ return String(s||"").toLowerCase().trim()
    .replace(/[^a-z0-9\s-]/g,"").replace(/\s+/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,""); }

  // build a labeled textarea per section
  const box = $("sectionEditors");
  box.innerHTML = EVERGREEN_SECTIONS.map(s =>
    '<label style="margin-top:4px">'+s.icon+' '+s.label+'</label>'
    + '<textarea id="sec_'+s.key+'" data-key="'+s.key+'" placeholder="'+s.hint+'" '
    + 'style="width:100%;min-height:20vh;background:#0A0E12;border:1px solid var(--line);border-radius:10px;color:#D6E0EA;'
    + 'font-family:var(--mono);font-size:13px;line-height:1.6;padding:14px 16px;outline:none;resize:vertical;margin-bottom:12px"></textarea>'
  ).join("");
  const areas = EVERGREEN_SECTIONS.map(s => $("sec_"+s.key));

  // ✨ Refine with Claude — attached under the First Instinct textarea
  const fiArea = $("sec_first_instinct");
  if (fiArea) {
    const wrap = document.createElement("div");
    wrap.innerHTML = '<button type="button" class="btn ghost sec-refine" id="refineFI" style="margin:-4px 0 12px">✨ Refine with Claude</button>'
      + '<div class="refine-preview" id="fiPreview" style="display:none;margin:0 0 12px"></div>';
    fiArea.after(wrap);
    $("refineFI").onclick = refineFI;
  }
  async function refineFI(){
    const btn=$("refineFI"), prev=$("fiPreview");
    const raw=(fiArea.value||"").trim();
    if(!raw){ flash("Write First Instinct notes first.", true); fiArea.focus(); return; }
    const label=btn.textContent; btn.textContent="Refining…"; btn.disabled=true;
    try{
      const r=await EvergreenAPI.withAuth(()=>EvergreenAPI.refine({
        raw_notes:raw, problem:$("sec_problem").value, key_takeaways:$("sec_key_takeaways").value }));
      if(!r) return;
      const refined=(r.refined||"").trim();
      prev.innerHTML='<div class="refine-label">✨ Refined suggestion</div>'
        +'<div class="md refine-body">'+marked.parse(refined||"*Claude returned nothing.*")+'</div>'
        +'<div class="sec-actions" style="margin-top:10px"><button type="button" class="btn primary" id="fiReplace">Replace my notes</button>'
        +'<button type="button" class="btn ghost" id="fiKeep">Keep original</button></div>';
      prev.style.display="";
      $("fiReplace").onclick=()=>{ fiArea.value=refined; prev.style.display="none"; prev.innerHTML=""; renderPreview(); fiArea.focus(); };
      $("fiKeep").onclick=()=>{ prev.style.display="none"; prev.innerHTML=""; };
    }catch(e){ flash("Refine failed: "+e.message, true); }
    finally{ btn.textContent=label; btn.disabled=false; }
  }

  // token bar
  const tokenbar = $("tokenbar"), tokenInput = $("token");
  function refreshToken(){ const ok = EvergreenAPI.hasToken();
    tokenbar.classList.toggle("ok", ok);
    tokenbar.querySelector(".lbl").textContent = ok ? "Password: saved" : "Password:";
    if (ok) tokenInput.placeholder = "•••••••• (saved on this device)"; }
  $("saveToken").addEventListener("click",()=>{ EvergreenAPI.setToken(tokenInput.value); tokenInput.value=""; refreshToken(); flash("Password saved."); });
  refreshToken();

  // combined live preview
  const preview = $("preview");
  function values(){ const v={}; for(const s of EVERGREEN_SECTIONS) v[s.key]=$("sec_"+s.key).value; return v; }
  function renderPreview(){ preview.innerHTML = EvergreenSections.renderHTML(values(), marked) || "<p class='slughint'>Nothing yet — start writing.</p>"; }
  areas.forEach(a => a.addEventListener("input", renderPreview));

  $("title").addEventListener("input",()=>{ if(!editingSlug){ const s=slugify($("title").value);
    $("slughint").textContent = s ? "url slug: "+s : ""; } });

  function flash(msg,isErr){ const el=$("savedMsg"); el.textContent=msg; el.style.color=isErr?"var(--over)":"var(--done)";
    setTimeout(()=>{ if(el.textContent===msg) el.textContent=""; }, 3000); }

  async function save(){
    const title = $("title").value.trim();
    if(!title){ flash("Give it a title first.", true); $("title").focus(); return; }
    const payload = Object.assign({
      title, note: $("note").value.trim(),
      tags: $("tags").value.split(",").map(s=>s.trim()).filter(Boolean)
    }, values());
    $("status").textContent = "saving…";
    try{
      const saved = await EvergreenAPI.withAuth(()=> editingSlug
        ? EvergreenAPI.updateConcept(editingSlug, payload)
        : EvergreenAPI.createConcept(payload));
      $("status").textContent = "";
      if(!saved) return;
      refreshToken();
      location.href = "reader.html?c=" + encodeURIComponent(saved.slug);
    }catch(e){ $("status").textContent=""; flash(e.message, true); }
  }
  $("saveBtn").addEventListener("click", save);
  $("saveBtn2").addEventListener("click", save);

  $("delBtn").addEventListener("click", async ()=>{
    if(!editingSlug) return;
    if(!confirm('Delete "'+ (existing?existing.title:editingSlug) +'" for good?')) return;
    try{ const r=await EvergreenAPI.withAuth(()=>EvergreenAPI.deleteConcept(editingSlug)); if(!r) return; location.href="concepts.html"; }
    catch(e){ flash(e.message, true); }
  });

  if(editingSlug){
    $("edtitle").textContent = "Edit concept";
    $("delBtn").style.display = "";
    EvergreenAPI.getConcept(editingSlug).then(c=>{
      existing = c;
      $("title").value = c.title; $("note").value = c.note || "";
      $("tags").value = (c.tags||[]).join(", ");
      // load sections; if empty but a legacy body exists, drop it into Rundown so nothing is lost
      const anySection = EVERGREEN_SECTIONS.some(s => (c[s.key]||"").trim());
      for(const s of EVERGREEN_SECTIONS) $("sec_"+s.key).value = c[s.key] || "";
      if(!anySection && (c.body||"").trim()) $("sec_rundown").value = c.body;
      $("slughint").textContent = "url slug: " + c.slug + "  (fixed)";
      renderPreview();
    }).catch(e=> flash("Couldn't load: "+e.message, true));
  } else {
    renderPreview();
  }
})();
</script>
</body>
</html>
